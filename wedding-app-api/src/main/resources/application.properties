# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/weddingdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:weddingapp}
spring.datasource.password=${DB_PASSWORD:weddingapp123}
# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# JWT
jwt.secret=${JWT_SECRET:your-local-secret-key-that-is-at-least-256-bits-long-for-hs256}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}
# App
app.base-url=${APP_BASE_URL:http://localhost:3000}
app.mail.from=${MAIL_FROM:invite@weddingapp.org}
# Mail
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}
# GraphQL
spring.graphql.graphiql.enabled=false