<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>GraphiQL — Wedding App API</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/graphiql/3.7.2/graphiql.min.css" rel="stylesheet"/>
</head>
<body style="margin: 0; overflow: hidden;">
<div id="graphiql" style="height: 100vh;"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin
        src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/graphiql/3.7.2/graphiql.min.js"></script>

<script>
    const fetcher = GraphiQL.createFetcher({url: '/graphql'});
    const root = ReactDOM.createRoot(document.getElementById('graphiql'));
    root.render(React.createElement(GraphiQL, {fetcher: fetcher}));
</script>
</body>
</html>
