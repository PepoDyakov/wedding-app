name: Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run backend tests
        working-directory: wedding-app-api
        run: ./gradlew test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: wedding-app-web
        run: npm ci

      - name: Run frontend tests
        working-directory: wedding-app-web
        run: npx vitest run

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        working-directory: wedding-app-api
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/wedding-app-api:latest .
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/wedding-app-api:latest

      - name: Deploy API to ECS
        run: |
          aws ecs update-service --cluster wedding-app --service wedding-api --force-new-deployment --region eu-central-1

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        working-directory: wedding-app-web
        run: |
          docker build --platform linux/amd64 --build-arg NEXT_PUBLIC_GRAPHQL_URL=http://wedding-alb-505914163.eu-central-1.elb.amazonaws.com/graphql -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/wedding-app-web:latest .
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/wedding-app-web:latest

      - name: Deploy Web to ECS
        run: |
          aws ecs update-service --cluster wedding-app --service wedding-web --force-new-deployment --region eu-central-1
